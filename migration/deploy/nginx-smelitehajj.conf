# Nginx config for smelitehajj.com
# Place this file at: /etc/nginx/sites-available/smelitehajj.conf

server {
    listen 80;
    server_name smelitehajj.com www.smelitehajj.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name smelitehajj.com www.smelitehajj.com;

    # SSL (will be set up by certbot)
    ssl_certificate /etc/letsencrypt/live/smelitehajj.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smelitehajj.com/privkey.pem;

    # Frontend (React build)
    root /var/www/smelitehajj/dist;
    index index.html;

    # ---- Compression ----
    # Serve pre-compressed .br / .gz files generated by vite-plugin-compression at build time.
    # This is *much* smaller and faster than runtime gzip (especially brotli).
    # Requires nginx modules: ngx_brotli (brotli_static) and ngx_http_gzip_static_module.
    brotli_static on;
    gzip_static on;

    # Fallback runtime gzip for resources that weren't pre-compressed
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml text/javascript image/svg+xml
        application/json application/javascript application/xml
        application/xml+rss application/manifest+json font/ttf font/otf;

    # Static assets (Vite-hashed JS/CSS) - long cache, file names change on every build
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot|webp|mp4)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # CRITICAL: index.html must NEVER be cached so users always get the latest build
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Service worker & manifest - never cache
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        expires 0;
    }
    location = /manifest.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        expires 0;
    }
    location = /favicon.ico { expires 7d; access_log off; }
    location = /robots.txt  { expires 7d; access_log off; }

    # Backend API proxy (port 3001)
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Uploaded files
    location /uploads/ {
        alias /var/www/smelitehajj/backend/uploads/;
        expires 30d;
    }

    # SPA fallback - all routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
