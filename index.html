<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>S. M. Elite Hajj Limited | Hajj & Umrah Services</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="image" href="/company-logo.webp" fetchpriority="high">
    <!-- Responsive hero LCP preload: mobile gets 37KB, desktop gets 84KB -->
    <link rel="preload" as="image" href="/hero-kaaba-mobile.webp" media="(max-width: 768px)" fetchpriority="high">
    <link rel="preload" as="image" href="/hero-kaaba.webp" media="(min-width: 769px)" fetchpriority="high">
    <!-- Single critical font: Inter only. Everything else is lazy-loaded after window load. -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"></noscript>
    <!-- Lazy-load display + decorative fonts AFTER full page load so they never block LCP -->
    <script>
      (function(){
        function loadFonts(){
          var l = document.createElement('link');
          l.rel = 'stylesheet';
          l.href = 'https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Aref+Ruqaa:wght@700&family=Raleway:wght@500;700&family=Reem+Kufi:wght@500;700&family=Scheherazade+New:wght@700&display=swap';
          document.head.appendChild(l);
        }
        if (document.readyState === 'complete') setTimeout(loadFonts, 1500);
        else window.addEventListener('load', function(){ setTimeout(loadFonts, 1500); }, { once: true });
      })();
    </script>
    <meta name="description" content="Your trusted partner for Hajj & Umrah journeys. Government approved agency providing premium packages with comprehensive services." />
    <meta name="author" content="S.M. Elite Hajj Limited" />
    <link rel="icon" type="image/webp" href="/favicon.webp" />
    <link rel="apple-touch-icon" href="/favicon.webp" />
    <link rel="canonical" href="https://smelitehajj.com/" />

    <meta property="og:title" content="S. M. Elite Hajj Limited | Hajj & Umrah Services" />
    <meta property="og:description" content="Your trusted partner for Hajj & Umrah journeys. Government approved agency providing premium packages." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://smelitehajj.com/" />
    <meta property="og:image" content="https://smelitehajj.com/favicon.jpeg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@smelitehajj" />
    <meta name="twitter:image" content="https://smelitehajj.com/favicon.jpeg" />
    <!-- Critical CSS: instant hero background + correct height before React boots.
         Eliminates CLS (height swap) and FCP delay caused by waiting for app CSS. -->
    <style>
      html,body{margin:0;padding:0;background:#0f3a2e;color:#fff;font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
      #root{min-height:100vh}
      .hero-bootstrap{position:relative;width:100%;height:70vh;background:#0f3a2e center/cover no-repeat;overflow:hidden}
      @media (max-width:768px){.hero-bootstrap{height:60vh;background-image:url('/hero-kaaba-mobile.webp')}}
      @media (min-width:769px){.hero-bootstrap{background-image:url('/hero-kaaba.webp')}}
      .hero-bootstrap::after{content:"";position:absolute;inset:0;background:linear-gradient(to top,rgba(15,58,46,.95),rgba(15,58,46,.5),transparent)}
      .header-bootstrap{position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);box-shadow:0 1px 3px rgba(0,0,0,.08)}
      .header-bootstrap-inner{display:flex;align-items:center;justify-content:space-between;max-width:1280px;margin:0 auto;padding:12px 16px}
      .header-bootstrap img{height:48px;width:auto}
      @media (min-width:640px){.header-bootstrap img{height:56px}}
    </style>
    <!-- Admin/CMS scripts: never download on public homepage — saves ~27KB + main-thread work -->
    <script>
      (function () {
        var p = location.pathname;
        function load(src) {
          var s = document.createElement("script");
          s.defer = true;
          s.src = src;
          document.head.appendChild(s);
        }
        if (p.startsWith("/admin")) {
          load("/admin-package-dnd.js?v=20260604-dnd");
        }
        if (!p.startsWith("/admin") && !p.startsWith("/auth")) {
          var schedule = function () {
            if (typeof requestIdleCallback === "function") {
              requestIdleCallback(function () { load("/package-section-cms-bridge.js?v=20260604-safe-package-section"); }, { timeout: 5000 });
            } else {
              setTimeout(function () { load("/package-section-cms-bridge.js?v=20260604-safe-package-section"); }, 3500);
            }
          };
          if (document.readyState === "complete") setTimeout(schedule, 2000);
          else window.addEventListener("load", function () { setTimeout(schedule, 2000); }, { once: true });
        }
      })();
    </script>
</head>

  <body>
    <div id="root">
      <!-- Instant LCP shell — replaced when React mounts -->
      <header class="header-bootstrap" aria-hidden="true">
        <div class="header-bootstrap-inner">
          <img src="/company-logo.webp" alt="" width="140" height="56" decoding="async" fetchpriority="high">
        </div>
      </header>
      <div class="hero-bootstrap" aria-hidden="true"></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
