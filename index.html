<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>S. M. Elite Hajj Limited | Hajj & Umrah Services</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Preload hero image for fast LCP -->
    <link rel="preload" as="image" href="/hero-kaaba.webp" media="(min-width: 768px)" fetchpriority="high">
    <link rel="preload" as="image" href="/hero-kaaba-mobile.webp" media="(max-width: 767px)" fetchpriority="high">

    <!-- Single critical font: Inter only. Everything else is lazy-loaded after window load. -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"></noscript>
    <!-- Lazy-load display + decorative fonts AFTER full page load so they never block LCP -->
    <script>
      (function(){
        function loadFonts(){
          var l = document.createElement('link');
          l.rel = 'stylesheet';
          l.href = 'https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Aref+Ruqaa:wght@700&family=Raleway:wght@500;700&family=Reem+Kufi:wght@500;700&family=Scheherazade+New:wght@700&display=swap';
          document.head.appendChild(l);
        }
        if (document.readyState === 'complete') setTimeout(loadFonts, 1500);
        else window.addEventListener('load', function(){ setTimeout(loadFonts, 1500); }, { once: true });
      })();
    </script>
    <meta name="description" content="Your trusted partner for Hajj & Umrah journeys. Government approved agency providing premium packages with comprehensive services." />
    <meta name="author" content="S.M. Elite Hajj Limited" />
    <link rel="icon" type="image/webp" href="/favicon.webp" />
    <link rel="apple-touch-icon" href="/favicon.webp" />
    <link rel="canonical" href="https://smelitehajj.com/" />

    <meta property="og:title" content="S. M. Elite Hajj Limited | Hajj & Umrah Services" />
    <meta property="og:description" content="Your trusted partner for Hajj & Umrah journeys. Government approved agency providing premium packages." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://smelitehajj.com/" />
    <meta property="og:image" content="https://smelitehajj.com/favicon.jpeg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@smelitehajj" />
    <meta name="twitter:image" content="https://smelitehajj.com/favicon.jpeg" />
    <!-- Critical CSS with hero bootstrap background to prevent flash -->
    <style>
      html,body{margin:0;padding:0;background:#0f3a2e;color:#fff;font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
      #root{min-height:100vh}
      .hero-bootstrap{background-image:url('/hero-kaaba.webp');background-size:cover;background-position:center;background-repeat:no-repeat}
      @media (max-width:767px){.hero-bootstrap{background-image:url('/hero-kaaba-mobile.webp')}}
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
